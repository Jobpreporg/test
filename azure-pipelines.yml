- task: SSH@0
  inputs:
    sshEndpoint: 'radicalVMSC'
    runOptions: 'inline'
    inline: |
      sudo rm -rf /var/www/html/*
      sudo mkdir -p /var/www/html
      exit 0

- task: SSH@0
  inputs:
    sshEndpoint: 'radicalVMSC'
    runOptions: 'inline'
    inline: |
      echo "Uploading files..."
      sudo apt install rsync -y
      rsync -avz ./drop/ /var/www/html/
